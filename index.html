<script type="text/babel">
const {useState,useEffect,useCallback} = React;
const SK = "kt_guests_v1", VK = "kt_visits_v1";
const C = {
  bg:"#0D1B1E",card:"#132226",cb:"#1E3A3F",
  accent:"#E8A045",al:"#F5C27A",teal:"#2EBFA5",
  td:"#1A7A6A",red:"#E05252",text:"#F0EDE8",
  muted:"#8A9EA0",ibg:"#0A1517",ok:"#4CAF85"
};

function Toast({message,type,onClose}){
  useEffect(()=>{const t=setTimeout(onClose,3000);return()=>clearTimeout(t);},[]);
  return <div style={{position:"fixed",top:20,right:20,zIndex:1000,background:type==="success"?C.ok:C.red,color:"#fff",padding:"12px 20px",borderRadius:10,fontWeight:500,fontSize:14,boxShadow:"0 8px 32px rgba(0,0,0,0.4)",animation:"slideIn 0.3s ease",display:"flex",alignItems:"center",gap:10}}>
    {type==="success"?"✅":"⚠️"} {message}
  </div>;
}

function Card({label,value,icon,color}){
  return <div style={{background:C.card,border:`1px solid ${C.cb}`,borderRadius:14,padding:"18px 20px",flex:1,minWidth:130,borderTop:`3px solid ${color}`}}>
    <div style={{fontSize:24,marginBottom:6}}>{icon}</div>
    <div style={{fontSize:26,fontWeight:700,color,fontFamily:"'Playfair Display',serif"}}>{value}</div>
    <div style={{fontSize:11,color:C.muted,marginTop:4,textTransform:"uppercase",letterSpacing:1}}>{label}</div>
  </div>;
}

function Inp({label,...p}){
  return <div style={{display:"flex",flexDirection:"column",gap:5}}>
    <label style={{fontSize:11,color:C.muted,textTransform:"uppercase",letterSpacing:1}}>{label}</label>
    <input {...p} style={{background:C.ibg,border:`1px solid ${C.cb}`,borderRadius:8,padding:"9px 13px",color:C.text,fontSize:14,fontFamily:"'DM Sans',sans-serif",width:"100%",...(p.style||{})}}/>
  </div>;
}

function App(){
  const [tab,setTab]=useState("dash");
  const [guests,setGuests]=useState([]);
  const [visits,setVisits]=useState([]);
  const [search,setSearch]=useState("");
  const [toast,setToast]=useState(null);
  const [editG,setEditG]=useState(null);
  const [viewG,setViewG]=useState(null);
  const [form,setForm]=useState({name:"",phone:"",pax:"1",dob:"",anni:"",notes:""});

  useEffect(()=>{
    try{
      const g=localStorage.getItem(SK);
      const v=localStorage.getItem(VK);
      if(g)setGuests(JSON.parse(g));
      if(v)setVisits(JSON.parse(v));
    }catch(e){}
  },[]);

  const sg=(g)=>{try{localStorage.setItem(SK,JSON.stringify(g));}catch(e){}};
  const sv=(v)=>{try{localStorage.setItem(VK,JSON.stringify(v));}catch(e){}};
  const toast2=(m,t="success")=>setToast({message:m,type:t});
  const reset=()=>setForm({name:"",phone:"",pax:"1",dob:"",anni:"",notes:""});

  const addGuest=()=>{
    if(!form.name.trim()||!form.phone.trim())return toast2("नाव आणि phone आवश्यक","error");
    if(!/^\d{10}$/.test(form.phone))return toast2("10 अंकी phone टाका","error");
    if(guests.find(g=>g.phone===form.phone))return toast2("हा phone आधीच registered","error");
    const g={id:Date.now()+"",name:form.name.trim(),phone:form.phone.trim(),pax:parseInt(form.pax)||1,dob:form.dob,anni:form.anni,notes:form.notes.trim(),at:new Date().toISOString()};
    const v={id:Date.now()+"v",gid:g.id,date:new Date().toISOString(),pax:g.pax};
    const ng=[...guests,g],nv=[...visits,v];
    setGuests(ng);setVisits(nv);sg(ng);sv(nv);
    reset();toast2(`${g.name} ला welcome! 🎉`);setTab("list");
  };

  const updateGuest=()=>{
    const u=guests.map(g=>g.id===editG.id?{...g,...form,pax:parseInt(form.pax)||1}:g);
    setGuests(u);sg(u);setEditG(null);reset();toast2("Update झाले ✓");
  };

  const markVisit=(g)=>{
    const nv=[...visits,{id:Date.now()+"v",gid:g.id,date:new Date().toISOString(),pax:g.pax}];
    setVisits(nv);sv(nv);toast2(`${g.name} चा visit! 🍽️`);
  };

  const delGuest=(id)=>{
    const ng=guests.filter(g=>g.id!==id),nv=visits.filter(v=>v.gid!==id);
    setGuests(ng);setVisits(nv);sg(ng);sv(nv);setViewG(null);toast2("काढले","error");
  };

  const vc=(id)=>visits.filter(v=>v.gid===id).length;
  const lv=(id)=>{
    const a=visits.filter(v=>v.gid===id).sort((a,b)=>new Date(b.date)-new Date(a.date));
    return a[0]?new Date(a[0].date).toLocaleDateString("mr-IN"):"—";
  };

  const now=new Date();
  const md=(d)=>`${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
  const tmr=new Date(now);tmr.setDate(now.getDate()+1);
  const todMD=md(now),tmrMD=md(tmr);

  const bToday=guests.filter(g=>g.dob&&g.dob.slice(5)===todMD);
  const aToday=guests.filter(g=>g.anni&&g.anni.slice(5)===todMD);
  const bTmr=guests.filter(g=>g.dob&&g.dob.slice(5)===tmrMD);
  const aTmr=guests.filter(g=>g.anni&&g.anni.slice(5)===tmrMD);
  const alertCount=bToday.length+aToday.length;
  const reg=guests.filter(g=>vc(g.id)>=3).length;
  const filt=guests.filter(g=>g.name.toLowerCase().includes(search.toLowerCase())||g.phone.includes(search));

  const tabs=[
    {id:"dash",label:"Dashboard",icon:"📊"},
    {id:"entry",label:"New Entry",icon:"➕"},
    {id:"list",label:"Guests",icon:"👥"},
    {id:"alerts",label:"Alerts",icon:"🔔",badge:alertCount},
    {id:"reports",label:"Reports",icon:"📈"},
  ];

  const waLink=(g,type)=>`https://wa.me/91${g.phone}?text=${encodeURIComponent(
    type==="b"
      ?`🎂 नमस्ते ${g.name}! Koconut Tree तर्फे वाढदिवसाच्या खूप खूप शुभेच्छा! 🥥 आज आमच्याकडे या — special treat आहे! 🎉`
      :`💑 नमस्ते ${g.name}! Koconut Tree तर्फे Anniversary च्या शुभेच्छा! 🥥 आज या — special evening वाट पाहतेय! 🌟`
  )}`;

  return <div style={{minHeight:"100vh",background:C.bg}}>
    {toast&&<Toast {...toast} onClose={()=>setToast(null)}/>}

    {/* HEADER */}
    <div style={{background:C.card,borderBottom:`1px solid ${C.cb}`,padding:"13px 18px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:100}}>
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        <span style={{fontSize:24}}>🥥</span>
        <div>
          <div style={{fontFamily:"'Playfair Display',serif",fontSize:16,fontWeight:700,color:C.accent}}>Koconut Tree</div>
          <div style={{fontSize:10,color:C.muted,letterSpacing:1,textTransform:"uppercase"}}>Guest Management</div>
        </div>
      </div>
      <div style={{fontSize:11,color:C.muted}}>{now.toLocaleDateString("mr-IN",{day:"numeric",month:"long",year:"numeric"})}</div>
    </div>

    {/* TABS */}
    <div style={{background:C.card,borderBottom:`1px solid ${C.cb}`,display:"flex",overflowX:"auto",padding:"0 10px"}}>
      {tabs.map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{background:"none",border:"none",cursor:"pointer",padding:"12px 14px",color:tab===t.id?C.accent:C.muted,borderBottom:tab===t.id?`2px solid ${C.accent}`:"2px solid transparent",fontSize:12,fontFamily:"'DM Sans',sans-serif",fontWeight:500,display:"flex",alignItems:"center",gap:4,whiteSpace:"nowrap"}}>
        {t.icon} {t.label}
        {t.badge>0&&<span style={{background:C.red,color:"#fff",borderRadius:10,fontSize:10,padding:"1px 5px",fontWeight:700}}>{t.badge}</span>}
      </button>)}
    </div>

    <div style={{maxWidth:900,margin:"0 auto",padding:"18px 14px"}}>

      {/* DASHBOARD */}
      {tab==="dash"&&<div style={{animation:"fadeIn 0.4s ease"}}>
        <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:20,color:C.accent,marginBottom:4}}>
          Good {now.getHours()<12?"Morning":now.getHours()<17?"Afternoon":"Evening"} 👋
        </h2>
        <p style={{color:C.muted,fontSize:13,marginBottom:18}}>Magarpatta, Pune</p>
        <div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:18}}>
          <Card label="Total Guests" value={guests.length} icon="👥" color={C.teal}/>
          <Card label="Total Visits" value={visits.length} icon="🍽️" color={C.accent}/>
          <Card label="Regular (3+)" value={reg} icon="⭐" color={C.al}/>
          <Card label="Today Alerts" value={alertCount} icon="🔔" color={C.red}/>
        </div>
        {alertCount>0&&<div style={{background:"linear-gradient(135deg,#1A3A2A,#1E3520)",border:"1px solid #2A5A3A",borderRadius:14,padding:16,marginBottom:16}}>
          <div style={{color:C.ok,fontWeight:600,marginBottom:10,fontSize:14}}>🎉 आजचे Special Guests</div>
          {bToday.map(g=><div key={g.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 0",borderBottom:"1px solid rgba(255,255,255,0.05)",fontSize:13}}>
            <span>🎂 <strong>{g.name}</strong> — वाढदिवस!</span>
            <a href={waLink(g,"b")} target="_blank" style={{background:"#25D366",color:"#fff",borderRadius:6,padding:"4px 10px",fontSize:11,fontWeight:600,textDecoration:"none"}}>WhatsApp</a>
          </div>)}
          {aToday.map(g=><div key={g.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 0",borderBottom:"1px solid rgba(255,255,255,0.05)",fontSize:13}}>
            <span>💑 <strong>{g.name}</strong> — Anniversary!</span>
            <a href={waLink(g,"a")} target="_blank" style={{background:"#25D366",color:"#fff",borderRadius:6,padding:"4px 10px",fontSize:11,fontWeight:600,textDecoration:"none"}}>WhatsApp</a>
          </div>)}
        </div>}
        <div style={{background:C.card,border:`1px solid ${C.cb}`,borderRadius:14,padding:16}}>
          <div style={{fontWeight:600,marginBottom:12,fontSize:13}}>🕐 Recent Visits</div>
          {visits.length===0&&<div style={{color:C.muted,fontSize:13}}>अजून visits नाहीत — New Entry करा!</div>}
          {visits.slice(-6).reverse().map(v=>{
            const g=guests.find(x=>x.id===v.gid);if(!g)return null;
            return <div key={v.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:`1px solid ${C.cb}`,fontSize:13}}>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <div style={{width:32,height:32,borderRadius:"50%",background:C.td,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700}}>{g.name[0].toUpperCase()}</div>
                <div><div style={{fontWeight:500}}>{g.name}</div><div style={{fontSize:11,color:C.muted}}>{v.pax} pax</div></div>
              </div>
              <div style={{fontSize:11,color:C.muted}}>{new Date(v.date).toLocaleDateString("mr-IN")}</div>
            </div>;
          })}
        </div>
      </div>}

      {/* NEW ENTRY */}
      {tab==="entry"&&<div style={{animation:"fadeIn 0.4s ease"}}>
        <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:20,color:C.accent,marginBottom:16}}>{editG?"✏️ Update करा":"➕ नवीन Guest Entry"}</h2>
        <div style={{background:C.card,border:`1px solid ${C.cb}`,borderRadius:16,padding:22}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
            <Inp label="Guest नाव *" placeholder="उदा. राहुल शर्मा" value={form.name} onChange={e=>setForm({...form,name:e.target.value})}/>
            <Inp label="Phone *" placeholder="10 अंक" value={form.phone} onChange={e=>setForm({...form,phone:e.target.value})} maxLength={10}/>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12,marginBottom:12}}>
            <Inp label="No. of Pax" type="number" min="1" max="50" value={form.pax} onChange={e=>setForm({...form,pax:e.target.value})}/>
            <Inp label="वाढदिवस (DOB)" type="date" value={form.dob} onChange={e=>setForm({...form,dob:e.target.value})}/>
            <Inp label="Anniversary" type="date" value={form.anni} onChange={e=>setForm({...form,anni:e.target.value})}/>
          </div>
          <div style={{marginBottom:16}}>
            <Inp label="Notes / Preferences" placeholder="उदा. Seafood allergic, window seat..." value={form.notes} onChange={e=>setForm({...form,notes:e.target.value})}/>
          </div>
          <div style={{display:"flex",gap:10}}>
            <button onClick={editG?updateGuest:addGuest} style={{background:`linear-gradient(135deg,${C.teal},${C.td})`,border:"none",borderRadius:10,padding:"11px 20px",color:"#fff",fontSize:14,fontWeight:600,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",flex:1}}>
              {editG?"✅ Update करा":"🎉 Guest Add + Visit Mark"}
            </button>
            {editG&&<button onClick={()=>{setEditG(null);reset();}} style={{background:"none",border:`1px solid ${C.cb}`,borderRadius:10,padding:"11px 16px",color:C.muted,cursor:"pointer"}}>Cancel</button>}
          </div>
        </div>
      </div>}

      {/* GUEST LIST */}
      {tab==="list"&&<div style={{animation:"fadeIn 0.4s ease"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:10}}>
          <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:20,color:C.accent}}>👥 Guests ({guests.length})</h2>
          <input placeholder="🔍 नाव किंवा phone..." value={search} onChange={e=>setSearch(e.target.value)} style={{background:C.ibg,border:`1px solid ${C.cb}`,borderRadius:8,padding:"8px 13px",color:C.text,fontSize:13,width:220}}/>
        </div>
        {filt.length===0&&<div style={{textAlign:"center",padding:50,color:C.muted}}>
          <div style={{fontSize:36,marginBottom:10}}>🔍</div>
          <div>{guests.length===0?"New Entry मध्ये जाऊन पहिला guest add करा!":"कोणी सापडले नाही"}</div>
        </div>}
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {filt.sort((a,b)=>vc(b.id)-vc(a.id)).map(g=>{
            const v=vc(g.id),ib=g.dob&&g.dob.slice(5)===todMD,ia=g.anni&&g.anni.slice(5)===todMD;
            return <div key={g.id} style={{background:C.card,border:`1px solid ${(ib||ia)?C.accent:C.cb}`,borderRadius:12,padding:"13px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <div style={{width:40,height:40,borderRadius:"50%",background:`linear-gradient(135deg,${C.teal},${C.td})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,fontWeight:700}}>{g.name[0].toUpperCase()}</div>
                <div>
                  <div style={{fontWeight:600,fontSize:14}}>{g.name}{ib&&" 🎂"}{ia&&" 💑"}</div>
                  <div style={{fontSize:11,color:C.muted}}>📞 {g.phone} · Last: {lv(g.id)}</div>
                </div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <div style={{textAlign:"center",minWidth:44}}>
                  <div style={{fontSize:17,fontWeight:700,color:v>=5?C.accent:v>=3?C.teal:C.muted}}>{v}</div>
                  <div style={{fontSize:10,color:C.muted}}>visits</div>
                </div>
                <button onClick={()=>markVisit(g)} style={{background:C.td,border:"none",borderRadius:7,padding:"6px 8px",cursor:"pointer",fontSize:14}} title="Visit Mark">🍽️</button>
                <button onClick={()=>{setEditG(g);setForm({name:g.name,phone:g.phone,pax:String(g.pax),dob:g.dob||"",anni:g.anni||"",notes:g.notes||""});setTab("entry");}} style={{background:"#1A2E35",border:"none",borderRadius:7,padding:"6px 8px",cursor:"pointer",fontSize:14}} title="Edit">✏️</button>
                <button onClick={()=>setViewG(g)} style={{background:"#1A2E35",border:"none",borderRadius:7,padding:"6px 8px",cursor:"pointer",fontSize:14}} title="Details">👁️</button>
              </div>
            </div>;
          })}
        </div>
      </div>}

      {/* ALERTS */}
      {tab==="alerts"&&<div style={{animation:"fadeIn 0.4s ease"}}>
        <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:20,color:C.accent,marginBottom:16}}>🔔 Birthday & Anniversary Alerts</h2>
        {[
          {label:"🎂 आजचे वाढदिवस",list:bToday,color:C.ok,type:"b"},
          {label:"💑 आजच्या Anniversaries",list:aToday,color:"#E91E8C",type:"a"},
          {label:"🎂 उद्याचे वाढदिवस",list:bTmr,color:C.teal,type:"b"},
          {label:"💑 उद्याच्या Anniversaries",list:aTmr,color:C.accent,type:"a"},
        ].map(s=><div key={s.label} style={{background:C.card,border:`1px solid ${C.cb}`,borderRadius:14,padding:16,marginBottom:12}}>
          <div style={{fontWeight:600,color:s.color,marginBottom:10,fontSize:13}}>{s.label} ({s.list.length})</div>
          {s.list.length===0?<div style={{color:C.muted,fontSize:13}}>आज कोणाचा नाही</div>
            :s.list.map(g=><div key={g.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:`1px solid ${C.cb}`,fontSize:13}}>
              <div><span style={{fontWeight:600}}>{g.name}</span><span style={{color:C.muted,fontSize:12,marginLeft:8}}>{g.pax} pax · {g.phone}</span></div>
              <a href={waLink(g,s.type)} target="_blank" style={{background:"#25D366",color:"#fff",borderRadius:7,padding:"5px 11px",fontSize:12,fontWeight:600,textDecoration:"none"}}>WhatsApp पाठवा</a>
            </div>)
          }
        </div>)}
      </div>}

      {/* REPORTS */}
      {tab==="reports"&&<div style={{animation:"fadeIn 0.4s ease"}}>
        <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:20,color:C.accent,marginBottom:16}}>📈 Reports</h2>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:14}}>
          <div style={{background:C.card,border:`1px solid ${C.cb}`,borderRadius:14,padding:16}}>
            <div style={{fontWeight:600,marginBottom:10,color:C.teal,fontSize:13}}>🏆 Top Regular Guests</div>
            {guests.length===0&&<div style={{color:C.muted,fontSize:13}}>अजून data नाही</div>}
            {guests.sort((a,b)=>vc(b.id)-vc(a.id)).slice(0,6).map((g,i)=><div key={g.id} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:`1px solid ${C.cb}`,fontSize:13}}>
              <span><span style={{color:C.muted,marginRight:6}}>#{i+1}</span>{g.name}</span>
              <span style={{color:C.accent,fontWeight:600}}>{vc(g.id)} visits</span>
            </div>)}
          </div>
          <div style={{background:C.card,border:`1px solid ${C.cb}`,borderRadius:14,padding:16}}>
            <div style={{fontWeight:600,marginBottom:10,color:C.teal,fontSize:13}}>📊 Loyalty Breakdown</div>
            {[
              {label:"नवीन (1 visit)",count:guests.filter(g=>vc(g.id)===1).length,color:C.muted},
              {label:"येणारे (2 visits)",count:guests.filter(g=>vc(g.id)===2).length,color:C.teal},
              {label:"Regular (3-5)",count:guests.filter(g=>vc(g.id)>=3&&vc(g.id)<=5).length,color:C.accent},
              {label:"VIP (6+)",count:guests.filter(g=>vc(g.id)>=6).length,color:C.al},
            ].map(r=><div key={r.label} style={{marginBottom:8}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:3,fontSize:12}}>
                <span style={{color:C.muted}}>{r.label}</span>
                <span style={{color:r.color,fontWeight:600}}>{r.count}</span>
              </div>
              <div style={{background:C.ibg,borderRadius:4,height:5}}>
                <div style={{background:r.color,borderRadius:4,height:5,width:guests.length?`${Math.min(100,(r.count/guests.length)*100)}%`:"0%"}}/>
              </div>
            </div>)}
          </div>
        </div>
        <div style={{background:C.card,border:`1px solid ${C.cb}`,borderRadius:14,padding:16}}>
          <div style={{fontWeight:600,marginBottom:10,color:C.teal,fontSize:13}}>📅 या महिन्यातील Special Days</div>
          {(()=>{
            const m=now.getMonth()+1;
            const u=guests.filter(g=>(g.dob&&parseInt(g.dob.split("-")[1])===m)||(g.anni&&parseInt(g.anni.split("-")[1])===m));
            return u.length===0?<div style={{color:C.muted,fontSize:13}}>या महिन्यात कोणाचे special days नाहीत</div>
              :u.map(g=><div key={g.id} style={{display:"flex",justifyContent:"space-between",padding:"7px 0",borderBottom:`1px solid ${C.cb}`,fontSize:13}}>
                <span>{g.name}</span>
                <span style={{color:C.muted}}>
                  {g.dob&&parseInt(g.dob.split("-")[1])===m&&`🎂 ${g.dob.slice(5).replace("-","/")} `}
                  {g.anni&&parseInt(g.anni.split("-")[1])===m&&`💑 ${g.anni.slice(5).replace("-","/")} `}
                </span>
              </div>);
          })()}
        </div>
      </div>}
    </div>

    {/* MODAL */}
    {viewG&&<div onClick={()=>setViewG(null)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200,padding:16}}>
      <div onClick={e=>e.stopPropagation()} style={{background:C.card,border:`1px solid ${C.cb}`,borderRadius:16,padding:22,width:"100%",maxWidth:400,animation:"fadeIn 0.3s ease"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:46,height:46,borderRadius:"50%",background:`linear-gradient(135deg,${C.teal},${C.td})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:19,fontWeight:700}}>{viewG.name[0].toUpperCase()}</div>
            <div>
              <div style={{fontFamily:"'Playfair Display',serif",fontSize:17,fontWeight:700}}>{viewG.name}</div>
              <div style={{color:C.teal,fontSize:12}}>{vc(viewG.id)} visits · Last: {lv(viewG.id)}</div>
            </div>
          </div>
          <button onClick={()=>setViewG(null)} style={{background:"none",border:"none",color:C.muted,fontSize:20,cursor:"pointer"}}>✕</button>
        </div>
        {[["📞 Phone",viewG.phone],["👥 Pax",viewG.pax],["🎂 DOB",viewG.dob?new Date(viewG.dob).toLocaleDateString("mr-IN"):"—"],["💑 Anniversary",viewG.anni?new Date(viewG.anni).toLocaleDateString("mr-IN"):"—"],["📝 Notes",viewG.notes||"—"]].map(([k,v])=><div key={k} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:`1px solid ${C.cb}`,fontSize:13}}>
          <span style={{color:C.muted}}>{k}</span><span style={{fontWeight:500}}>{v}</span>
        </div>)}
        <div style={{display:"flex",gap:10,marginTop:16}}>
          <button onClick={()=>{markVisit(viewG);setViewG(null);}} style={{flex:1,background:`linear-gradient(135deg,${C.teal},${C.td})`,border:"none",borderRadius:10,padding:"10px",color:"#fff",fontWeight:600,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",fontSize:13}}>🍽️ Visit Mark करा</button>
          <button onClick={()=>delGuest(viewG.id)} style={{background:"none",border:`1px solid ${C.red}`,borderRadius:10,padding:"10px 13px",color:C.red,cursor:"pointer"}}>🗑️</button>
        </div>
      </div>
    </div>}
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>


</body></html>
